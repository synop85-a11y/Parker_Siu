<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="파커-시우">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#F5B847">
<title>파커-시우</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Jua', 'Fredoka', sans-serif;
  background: linear-gradient(135deg, #FFE4A0 0%, #FFC97A 50%, #FFA94D 100%);
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

#app {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
}

/* 화면 전환 */
.screen {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  padding: 2vh 3vw;
}
.screen.active { display: flex; }
.screen.entering { animation: slideIn 0.4s ease-out; }
@keyframes slideIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* 헤더 */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2vh;
  min-height: 8vh;
}
.btn-back {
  background: white; border: 4px solid #2C2C2C;
  width: 7vh; height: 7vh; border-radius: 50%;
  font-size: 4vh; cursor: pointer;
  box-shadow: 0 4px 0 #2C2C2C;
  transition: transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.btn-back:active { transform: translateY(2px); box-shadow: 0 2px 0 #2C2C2C; }

.title {
  font-size: 5vh; font-weight: 700;
  color: white;
  text-shadow: 3px 3px 0 #2C2C2C, -2px -2px 0 #2C2C2C, 2px -2px 0 #2C2C2C, -2px 2px 0 #2C2C2C;
}

.stars-display {
  background: white; border: 4px solid #2C2C2C;
  padding: 1vh 2vh; border-radius: 3vh;
  font-size: 3vh; box-shadow: 0 4px 0 #2C2C2C;
  display: flex; align-items: center; gap: 1vh;
}

/* 홈 화면 */
#screen-home {
  align-items: center;
  justify-content: flex-start;
  position: relative;
  padding-top: 11vh;
}

.lion-mascot {
  width: 14vh; height: 14vh;
  position: absolute; top: 11vh; right: 3vw;
  animation: bob 2s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-1vh); }
}

.home-title {
  font-size: 7vh; font-weight: 700;
  color: white;
  text-shadow: 5px 5px 0 #2C2C2C, -3px -3px 0 #2C2C2C, 3px -3px 0 #2C2C2C, -3px 3px 0 #2C2C2C;
  margin-top: 2vh;
  margin-bottom: 3vh;
  letter-spacing: 0.1em;
}

.books-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 2vw;
  width: 100%;
  max-width: 90vw;
}

.book-card {
  background: white;
  border: 5px solid #2C2C2C;
  border-radius: 3vh;
  padding: 3vh 2vh;
  cursor: pointer;
  box-shadow: 0 8px 0 #2C2C2C;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5vh;
  position: relative;
  overflow: hidden;
}
.book-card:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 #2C2C2C;
}
.book-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 30%;
  z-index: 0;
}
.book-card[data-color="1"]::before { background: #FF6B9D; }
.book-card[data-color="2"]::before { background: #4ECDC4; }
.book-card[data-color="3"]::before { background: #FFE66D; }
.book-card[data-color="4"]::before { background: #95E1D3; }
.book-card[data-color="5"]::before { background: #C9A0FF; }

.book-icon {
  font-size: 8vh;
  position: relative; z-index: 1;
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2));
}
.book-name {
  font-size: 2.2vh;
  font-weight: 700;
  color: #2C2C2C;
  text-align: center;
  line-height: 1.2;
  position: relative; z-index: 1;
}
.book-progress {
  background: #F0F0F0;
  border: 2px solid #2C2C2C;
  height: 2vh;
  border-radius: 1vh;
  width: 100%;
  overflow: hidden;
  position: relative; z-index: 1;
}
.book-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFD700, #FF8C00);
  transition: width 0.5s;
}
.book-progress-text {
  font-size: 1.8vh; color: #666;
  position: relative; z-index: 1;
}

/* 유닛 선택 화면 */
.units-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2.5vh;
  padding: 0 2vw;
  flex: 1;
  align-content: start;
  max-height: 80vh;
  overflow-y: auto;
}
.unit-card {
  background: white;
  border: 4px solid #2C2C2C;
  border-radius: 2vh;
  padding: 2.5vh 2vh;
  cursor: pointer;
  box-shadow: 0 6px 0 #2C2C2C;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1vh;
}
.unit-card:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 #2C2C2C;
}
.unit-emoji { font-size: 5vh; }
.unit-name {
  font-size: 2.5vh; font-weight: 700;
  color: #2C2C2C; text-align: center;
}
.unit-count {
  font-size: 1.8vh; color: #888;
}
.unit-stars {
  display: flex; gap: 0.3vh;
  font-size: 2vh;
}

/* 문제 화면 */
#screen-quiz {
  justify-content: space-between;
}
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
}
.progress-bar {
  flex: 1;
  margin: 0 3vw;
  height: 3vh;
  background: rgba(255,255,255,0.5);
  border: 3px solid #2C2C2C;
  border-radius: 2vh;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ECDC4, #44A08D);
  transition: width 0.4s;
}

.quiz-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4vh;
}

.question-box {
  background: white;
  border: 5px solid #2C2C2C;
  border-radius: 3vh;
  padding: 4vh 6vw;
  box-shadow: 0 6px 0 #2C2C2C;
  min-width: 40vw;
  text-align: center;
}
.question-prompt {
  font-size: 3vh;
  color: #666;
  margin-bottom: 2vh;
  font-weight: 600;
}
.question-content {
  font-size: 10vh;
  font-weight: 700;
}
.question-content.text {
  font-family: 'Fredoka', sans-serif;
  font-size: 8vh;
  color: #2C2C2C;
  letter-spacing: 0.05em;
}
.question-level {
  margin-top: 2vh;
  font-size: 3vh;
}

.choices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2vw;
  width: 90vw;
}
.choice {
  background: white;
  border: 5px solid #2C2C2C;
  border-radius: 2.5vh;
  padding: 3vh 2vh;
  cursor: pointer;
  box-shadow: 0 6px 0 #2C2C2C;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 16vh;
  font-size: 6vh;
  font-weight: 700;
}
.choice.text {
  font-family: 'Fredoka', sans-serif;
  font-size: 4.5vh;
  color: #2C2C2C;
}
.choice:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 #2C2C2C;
}
.choice.correct {
  background: #6EE7B7;
  animation: correctPulse 0.5s;
}
.choice.wrong {
  background: #FCA5A5;
  animation: wrongShake 0.4s;
}
.choice.disabled {
  pointer-events: none;
  opacity: 0.6;
}
@keyframes correctPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-1vw); }
  75% { transform: translateX(1vw); }
}

/* 결과 화면 */
#screen-result {
  align-items: center;
  justify-content: center;
}
.result-box {
  background: white;
  border: 6px solid #2C2C2C;
  border-radius: 4vh;
  padding: 5vh 8vw;
  box-shadow: 0 10px 0 #2C2C2C;
  text-align: center;
  max-width: 70vw;
}
.result-title {
  font-size: 7vh; font-weight: 700; color: #2C2C2C;
  margin-bottom: 3vh;
}
.result-score {
  font-size: 5vh; color: #666;
  margin-bottom: 3vh;
}
.result-stars {
  font-size: 8vh;
  margin-bottom: 3vh;
  letter-spacing: 1vh;
}
.result-buttons {
  display: flex; gap: 3vw; justify-content: center;
  margin-top: 3vh;
}
.btn-action {
  background: #FFD93D;
  border: 4px solid #2C2C2C;
  padding: 2.5vh 4vw;
  font-size: 3.5vh;
  font-weight: 700;
  border-radius: 2vh;
  cursor: pointer;
  box-shadow: 0 6px 0 #2C2C2C;
  font-family: inherit;
  transition: all 0.15s;
}
.btn-action.primary { background: #4ECDC4; color: white; }
.btn-action:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 #2C2C2C;
}

/* 레벨업 팝업 */
.levelup-popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.levelup-popup.show { display: flex; }
.levelup-content {
  background: white;
  border: 6px solid #2C2C2C;
  border-radius: 4vh;
  padding: 5vh 6vw;
  text-align: center;
  box-shadow: 0 10px 0 #2C2C2C;
  animation: popIn 0.5s ease-out;
}
@keyframes popIn {
  0% { transform: scale(0) rotate(-180deg); }
  60% { transform: scale(1.2) rotate(10deg); }
  100% { transform: scale(1) rotate(0); }
}
.levelup-icon {
  font-size: 15vh;
  filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.3));
  animation: spin 1s ease-out;
}
@keyframes spin {
  from { transform: rotate(0deg) scale(0.5); }
  to { transform: rotate(360deg) scale(1); }
}
.levelup-text {
  font-size: 5vh; font-weight: 700; color: #2C2C2C;
  margin-top: 2vh;
}

/* 사운드 토글 */
.sound-toggle {
  position: absolute;
  top: 2vh; right: 3vw;
  background: white;
  border: 3px solid #2C2C2C;
  width: 6vh; height: 6vh;
  border-radius: 50%;
  font-size: 3vh;
  cursor: pointer;
  box-shadow: 0 4px 0 #2C2C2C;
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
}
.sound-toggle:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #2C2C2C;
}

/* 색종이 컨페티 */
.confetti {
  position: fixed;
  width: 2vh; height: 2vh;
  pointer-events: none;
  z-index: 200;
  animation: confettiFall 2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* 로딩 */
.loading {
  position: fixed; inset: 0;
  background: #FFE4A0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 3vh;
  z-index: 1000;
}
.loading-lion {
  width: 25vh; height: 25vh;
  animation: bob 1s ease-in-out infinite;
}
.loading-text {
  font-size: 4vh; color: #2C2C2C;
}

/* ========================================
   별/가챠/도감 시스템
   ======================================== */

/* 홈 화면 상단 별 카운터 + 버튼들 */
.home-top-bar {
  position: absolute; top: 2vh; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 1.5vh;
  z-index: 10;
}
.star-counter {
  background: linear-gradient(135deg, #FFE066 0%, #FFB627 100%);
  padding: 1.2vh 2.5vh; border-radius: 99px;
  font-size: 3.2vh; color: #5C3A00;
  border: 0.4vh solid #fff;
  box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.2);
  display: flex; align-items: center; gap: 1vh;
}
.star-counter .star-icon {
  font-size: 3.5vh;
  animation: spin-star 3s linear infinite;
}
@keyframes spin-star {
  0%, 80%, 100% { transform: rotate(0deg); }
  90% { transform: rotate(20deg); }
}
.home-action-btn {
  background: linear-gradient(135deg, #FF6B9D 0%, #C9358D 100%);
  color: #fff; padding: 1.2vh 2.5vh; border-radius: 99px;
  font-size: 2.8vh; border: 0.4vh solid #fff;
  box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.2);
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 1vh;
  transition: transform 0.15s;
}
.home-action-btn:active { transform: scale(0.95); }
.home-action-btn.gacha {
  background: linear-gradient(135deg, #A855F7 0%, #6D28D9 100%);
}
.home-action-btn.dex {
  background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
}
.home-action-btn.reset {
  background: linear-gradient(135deg, #9CA3AF 0%, #4B5563 100%);
  font-size: 2.3vh; padding: 1vh 2vh;
}
.home-action-btn .badge {
  background: #fff; color: #C9358D;
  padding: 0.3vh 1vh; border-radius: 99px;
  font-size: 2.2vh; min-width: 3vh; text-align: center;
}

/* 퀴즈 화면 별 디스플레이 */
.quiz-stars {
  position: absolute; top: 8vh; right: 3vh;
  background: rgba(255,255,255,0.95);
  padding: 0.8vh 1.8vh; border-radius: 99px;
  font-size: 2.5vh; color: #5C3A00;
  border: 0.3vh solid #FFB627;
  display: flex; align-items: center; gap: 0.8vh;
  z-index: 5;
  box-shadow: 0 0.4vh 1vh rgba(0,0,0,0.15);
}
.quiz-stars.bump { animation: starBump 0.5s ease-out; }
@keyframes starBump {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); background: #FFE066; }
  100% { transform: scale(1); }
}

/* 별 획득 플라잉 애니메이션 */
.flying-star {
  position: fixed; pointer-events: none; z-index: 1000;
  font-size: 5vh;
  animation: flyToTop 0.9s ease-in forwards;
}
@keyframes flyToTop {
  0% { opacity: 1; transform: scale(1.5) rotate(0deg); }
  50% { opacity: 1; transform: scale(1) rotate(180deg); }
  100% { opacity: 0; transform: scale(0.3) rotate(360deg) translate(20vh, -40vh); }
}

/* ============== 가챠 화면 ============== */
#screen-gacha {
  background: linear-gradient(135deg, #4C1D95 0%, #7C3AED 50%, #C026D3 100%);
  flex-direction: column;
  position: relative;
}
.gacha-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2vh 3vh; width: 100%;
}
.gacha-title {
  font-size: 4.5vh; color: #FFE066; font-weight: 700;
  text-shadow: 0 0.4vh 0.8vh rgba(0,0,0,0.4);
}
.gacha-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; padding: 2vh;
}
.gacha-machine {
  width: 35vh; height: 35vh;
  background: radial-gradient(circle, #FFE066 0%, #FFB627 70%);
  border-radius: 50%; border: 0.8vh solid #fff;
  box-shadow: 0 1vh 3vh rgba(0,0,0,0.3), inset 0 0 5vh rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 18vh;
  animation: machineFloat 3s ease-in-out infinite;
  position: relative;
}
@keyframes machineFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2vh); }
}
.gacha-machine.shaking {
  animation: gachaShake 0.4s ease-in-out 3;
}
@keyframes gachaShake {
  0%, 100% { transform: translateX(0) rotate(0); }
  25% { transform: translateX(-2vh) rotate(-5deg); }
  75% { transform: translateX(2vh) rotate(5deg); }
}
.gacha-pull-btn {
  margin-top: 4vh;
  background: linear-gradient(135deg, #FFE066 0%, #FF6B00 100%);
  color: #5C3A00; padding: 2.5vh 6vh;
  border-radius: 99px; font-size: 4vh; font-weight: 700;
  border: 0.6vh solid #fff;
  box-shadow: 0 0.8vh 2vh rgba(0,0,0,0.3);
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 1.5vh;
  transition: transform 0.15s;
}
.gacha-pull-btn:active { transform: scale(0.95); }
.gacha-pull-btn:disabled {
  background: #6b7280; color: #d1d5db;
  cursor: not-allowed; box-shadow: none;
}
.gacha-cost {
  margin-top: 2vh; font-size: 2.8vh; color: #FFE066;
}

/* 카드 공개 오버레이 */
.card-reveal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 2000;
}
.card-reveal-overlay.show { display: flex; }
.card-reveal {
  display: flex; flex-direction: column; align-items: center;
  animation: revealPop 0.6s ease-out;
}
@keyframes revealPop {
  0% { opacity: 0; transform: scale(0.3) rotate(-20deg); }
  60% { transform: scale(1.1) rotate(5deg); }
  100% { opacity: 1; transform: scale(1) rotate(0); }
}
.reveal-card {
  width: 35vh; height: 45vh;
  background: #fff; border-radius: 3vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 3vh;
  box-shadow: 0 2vh 5vh rgba(0,0,0,0.5);
  position: relative; overflow: hidden;
}
.reveal-card.common { border: 0.8vh solid #9ca3af; }
.reveal-card.rare { 
  border: 0.8vh solid #3b82f6;
  box-shadow: 0 0 5vh #3b82f6, 0 2vh 5vh rgba(0,0,0,0.5);
}
.reveal-card.epic { 
  border: 0.8vh solid #a855f7;
  box-shadow: 0 0 6vh #a855f7, 0 2vh 5vh rgba(0,0,0,0.5);
  animation: epicGlow 1.5s ease-in-out infinite;
}
@keyframes epicGlow {
  0%, 100% { box-shadow: 0 0 6vh #a855f7, 0 2vh 5vh rgba(0,0,0,0.5); }
  50% { box-shadow: 0 0 10vh #a855f7, 0 2vh 5vh rgba(0,0,0,0.5); }
}
.reveal-card.legendary {
  border: 0.8vh solid #facc15;
  box-shadow: 0 0 8vh #facc15, 0 2vh 5vh rgba(0,0,0,0.5);
  animation: legendaryGlow 1s ease-in-out infinite;
}
@keyframes legendaryGlow {
  0%, 100% { 
    box-shadow: 0 0 8vh #facc15, 0 2vh 5vh rgba(0,0,0,0.5);
    background: #fff;
  }
  50% { 
    box-shadow: 0 0 15vh #facc15, 0 2vh 5vh rgba(0,0,0,0.5);
    background: #fffbeb;
  }
}
.reveal-rarity {
  position: absolute; top: 1.5vh; right: 1.5vh;
  padding: 0.5vh 1.5vh; border-radius: 99px;
  font-size: 2.3vh; font-weight: 700; color: #fff;
}
.reveal-rarity.common { background: #9ca3af; }
.reveal-rarity.rare { background: #3b82f6; }
.reveal-rarity.epic { background: #a855f7; }
.reveal-rarity.legendary { background: #facc15; color: #5C3A00; }
.reveal-emoji { font-size: 22vh; line-height: 1; }
.reveal-img { width: 24vh; height: 24vh; object-fit: contain; }
.reveal-name { font-size: 4.5vh; color: #2C2C2C; margin-top: 2vh; }
.reveal-name-en { font-size: 3vh; color: #6b7280; }
.reveal-status {
  margin-top: 2vh; font-size: 2.8vh; color: #fff;
  background: rgba(255,255,255,0.2); padding: 1vh 2.5vh;
  border-radius: 99px;
}
.reveal-status.new { background: #10b981; color: #fff; font-weight: 700; }
.reveal-status.upgrade { background: #f59e0b; color: #fff; font-weight: 700; }
.reveal-tap-hint {
  margin-top: 3vh; color: #FFE066; font-size: 2.5vh;
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ============== 도감 화면 ============== */
#screen-dex {
  background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 50%, #60A5FA 100%);
  flex-direction: column;
  padding: 0;
}
.dex-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2vh 3vh; width: 100%;
}
.dex-title {
  font-size: 4vh; color: #fff; font-weight: 700;
  text-shadow: 0 0.4vh 0.8vh rgba(0,0,0,0.3);
}
.dex-progress {
  background: rgba(255,255,255,0.2); color: #fff;
  padding: 1vh 2vh; border-radius: 99px; font-size: 2.5vh;
}
.dex-tabs {
  display: flex; gap: 1vh; padding: 0 3vh; width: 100%;
}
.dex-tab {
  flex: 1; padding: 1.5vh; text-align: center;
  background: rgba(255,255,255,0.2); color: #fff;
  border-radius: 1.5vh 1.5vh 0 0; cursor: pointer;
  font-size: 2.8vh; font-family: inherit;
  border: none;
}
.dex-tab.active { background: #fff; color: #1E3A8A; font-weight: 700; }
.dex-grid {
  flex: 1; width: 100%;
  background: rgba(255,255,255,0.95);
  padding: 2.5vh; overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(13vh, 1fr));
  gap: 1.5vh;
  align-content: start;
}
.dex-card {
  aspect-ratio: 3/4;
  background: #f3f4f6; border-radius: 1.5vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 1vh;
  cursor: pointer; position: relative;
  border: 0.4vh solid #d1d5db;
  transition: transform 0.15s;
}
.dex-card:active { transform: scale(0.95); }
.dex-card.locked {
  background: #e5e7eb; opacity: 0.6;
}
.dex-card.locked .dex-card-emoji {
  filter: grayscale(1) brightness(0.6);
}
.dex-card.locked .dex-card-name {
  color: #9ca3af;
}
.dex-card-emoji {
  font-size: 6vh; line-height: 1;
}
.dex-card-img {
  width: 7vh; height: 7vh; object-fit: contain;
}
.dex-card.locked .dex-card-img {
  filter: grayscale(1) brightness(0.6) opacity(0.7);
}
.dex-card-name {
  margin-top: 0.5vh; font-size: 2vh; color: #2C2C2C;
  text-align: center; line-height: 1.1;
}
.dex-card-count {
  position: absolute; top: 0.5vh; right: 0.5vh;
  background: #fff; color: #2C2C2C;
  font-size: 1.8vh; padding: 0.2vh 0.8vh;
  border-radius: 99px; min-width: 2.5vh; text-align: center;
  border: 0.2vh solid #d1d5db;
  font-weight: 700;
}
.dex-card-rarity {
  position: absolute; top: 0.5vh; left: 0.5vh;
  width: 1.5vh; height: 1.5vh; border-radius: 50%;
}
/* 테두리 등급 */
.dex-card.tier-bronze { border-color: #cd7f32; box-shadow: 0 0 1.5vh rgba(205,127,50,0.5); }
.dex-card.tier-silver { border-color: #c0c0c0; box-shadow: 0 0 1.5vh rgba(192,192,192,0.7); }
.dex-card.tier-gold { border-color: #ffd700; box-shadow: 0 0 2vh rgba(255,215,0,0.7); }
.dex-card.tier-rainbow { 
  border-color: transparent;
  background: linear-gradient(#f3f4f6, #f3f4f6) padding-box,
              linear-gradient(45deg, #ff0080, #ffae00, #ffff00, #00ff00, #0066ff, #cc00ff) border-box;
  box-shadow: 0 0 2.5vh rgba(255,0,128,0.6);
  animation: rainbowGlow 2s linear infinite;
}
@keyframes rainbowGlow {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* 도감 카드 상세 팝업 */
.dex-detail {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 2000;
}
.dex-detail.show { display: flex; }
.dex-detail-card {
  background: #fff; border-radius: 3vh;
  padding: 3vh; width: 40vh; max-width: 90vw;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
  animation: revealPop 0.4s ease-out;
}
.dex-detail-emoji { font-size: 18vh; line-height: 1; }
.dex-detail-img { width: 20vh; height: 20vh; object-fit: contain; }
.dex-detail-name-ko { font-size: 4vh; color: #2C2C2C; margin-top: 1.5vh; }
.dex-detail-name-en { font-size: 2.8vh; color: #6b7280; }
.dex-detail-info {
  margin-top: 2vh; display: flex; gap: 1.5vh;
}
.dex-detail-tag {
  padding: 0.8vh 1.8vh; border-radius: 99px;
  font-size: 2.2vh; color: #fff;
}
.dex-detail-close {
  position: absolute; top: 1.5vh; right: 1.5vh;
  width: 4.5vh; height: 4.5vh; border-radius: 50%;
  background: #f3f4f6; border: none; cursor: pointer;
  font-size: 2.5vh; color: #6b7280;
}

/* 결과 화면에 가챠 별 표시 추가 */
.result-earned-stars {
  font-size: 3vh; color: #FFB627; margin-top: 1.5vh;

}
.result-earned-stars .big {

/* 별 부족 알림 */
.no-stars-msg {

.no-stars-msg .small { font-size: 2.3vh; color: #6b7280; margin-top: 1vh; }

// 도형 단어 분리 매핑
function getEmoji(word) {
  const lower = word.toLowerCase();
  if (EMOJI_MAP[lower]) return EMOJI_MAP[lower];
  // 색+도형 조합 분해 시도
  const parts = lower.split(' ');
  if (parts.length === 2 && EMOJI_MAP[parts[1]]) return EMOJI_MAP[parts[1]];
  return null;
}

  return p[id] || { attempts: 0, correct: 0, level: 0 };
}
function updateItemProgress(id, isCorrect) {
  const p = loadProgress();
  const prog = p[id] || { attempts: 0, correct: 0, level: 0 };
  const oldLevel = prog.level;
  prog.attempts++;
  if (isCorrect) prog.correct++;
  prog.level = calcLevel(prog.correct);
  p[id] = prog;
  saveProgress(p);
  return { oldLevel, newLevel: prog.level, leveledUp: prog.level > oldLevel };
}

  common: 'NORMAL', rare: 'RARE', epic: 'EPIC', legendary: 'LEGEND'

const TIER_THRESHOLDS = [
  { min: 15, tier: 'rainbow' },
  { min: 10, tier: 'gold' },
  { min: 7, tier: 'silver' },
  { min: 4, tier: 'bronze' },
  { min: 1, tier: 'basic' }
];

function getCardTier(count) {
  for (const t of TIER_THRESHOLDS) {
    if (count >= t.min) return t.tier;
  }
  return 'none';
}

const STARS_KEY = 'lion_english_stars_v1';
const CARDS_KEY = 'lion_english_cards_v1';

function loadStars() {
  return parseInt(localStorage.getItem(STARS_KEY) || '0', 10);
}
function saveStars(n) {
  localStorage.setItem(STARS_KEY, String(Math.max(0, n)));
}
function addStars(n) {
  const cur = loadStars();
  saveStars(cur + n);
  return cur + n;
}
function spendStars(n) {
  const cur = loadStars();
  if (cur < n) return false;
  saveStars(cur - n);
  return true;
}

// ============================
// 카드 시스템
// ============================
function loadCards() {
  try { return JSON.parse(localStorage.getItem(CARDS_KEY)) || {}; }
  catch { return {}; }
}
function saveCards(c) {
  localStorage.setItem(CARDS_KEY, JSON.stringify(c));
}
function getCardCount(id) {
  const c = loadCards();
  return c[id] || 0;
}
function addCard(id) {
  const c = loadCards();
  const oldCount = c[id] || 0;
  c[id] = oldCount + 1;
  saveCards(c);
  const newTier = getCardTier(c[id]);
  const oldTier = getCardTier(oldCount);
  return {
    isNew: oldCount === 0,
    count: c[id],
    tierUp: newTier !== oldTier,
    tier: newTier
  };
}
function getOwnedCount() {
  const c = loadCards();
  return Object.keys(c).filter(k => c[k] > 0).length;
}

function rollGacha() {
  const r = Math.random();
  const rates = CARDS_DATA.gacha.rates;
  let pool;
  if (r < rates.legendary) pool = CARDS_DATA.cards.filter(c => c.rarity === 'legendary');
  else if (r < rates.legendary + rates.epic) pool = CARDS_DATA.cards.filter(c => c.rarity === 'epic');
  else if (r < rates.legendary + rates.epic + rates.rare) pool = CARDS_DATA.cards.filter(c => c.rarity === 'rare');
  else pool = CARDS_DATA.cards.filter(c => c.rarity === 'common');
  
  return pool[Math.floor(Math.random() * pool.length)];
}

function pullGacha() {
  const cost = CARDS_DATA.gacha.cost_per_pull;
  if (loadStars() < cost) {
    playSound('wrong');
    return;
  }
  
  playSound('tap');
  spendStars(cost);
  updateStarDisplay();
  
  // 머신 흔들기
  const machine = document.getElementById('gachaMachine');
  machine.classList.add('shaking');
  
  // 풀 버튼 비활성화
  const btn = document.getElementById('gachaPullBtn');
  btn.disabled = true;
  
  setTimeout(() => {
    machine.classList.remove('shaking');
    const card = rollGacha();
    const result = addCard(card.id);
    showCardReveal(card, result);
    
    // 버튼 상태 갱신
    setTimeout(() => {
      btn.disabled = loadStars() < cost;
      updateStarDisplay();
    }, 100);
  }, 1200);
}

function showCardReveal(card, result) {
  const reveal = document.getElementById('cardReveal');
  const isImage = card.image && card.type === 'dinosaur';
  
  let statusHTML = '';
  if (result.isNew) {
    statusHTML = '<div class="reveal-status new">✨ NEW! ✨</div>';
  } else if (result.tierUp && result.tier !== 'basic') {
    const tierName = { bronze: '동', silver: '은', gold: '금', rainbow: '무지개' }[result.tier];
    statusHTML = `<div class="reveal-status upgrade">⬆ ${tierName} 등급 업!</div>`;
  } else {
    statusHTML = `<div class="reveal-status">중복 (${result.count}장)</div>`;
  }
  
  const visual = card.image
    ? `<img class="reveal-img" src="${card.image}" alt="${card.name_ko}">`
    : `<div class="reveal-emoji">${card.emoji}</div>`;
  
  reveal.innerHTML = `
    <div class="reveal-card ${card.rarity}">
      <div class="reveal-rarity ${card.rarity}">${RARITY_LABELS[card.rarity]}</div>
      ${visual}

      <div class="reveal-name-en">${card.name_en}</div>
    </div>

    <div class="reveal-tap-hint">탭하면 닫혀요</div>
  `;
  
  document.getElementById('cardRevealOverlay').classList.add('show');
  
  // 등급별 사운드
  if (card.rarity === 'legendary') {
    playSound('levelup');
    setTimeout(() => playSound('correct'), 200);
  } else if (card.rarity === 'epic') {
    playSound('levelup');
  } else if (card.rarity === 'rare') {
    playSound('correct');
  } else {

  }

// ============================
// 오디오 시스템 (Web Audio)
// ============================
let audioCtx = null;
let bgmNodes = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playSound(type) {
  if (!soundOn) return;
  initAudio();
  const ctx = audioCtx;
  const now = ctx.currentTime;
  if (type === 'correct') {
    // 도-미-솔 상승음
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.2, now + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.3);
    });
  } else if (type === 'wrong') {
    // 낮은 부저음
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.linearRampToValueAtTime(110, now + 0.3);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.3);
  } else if (type === 'levelup') {
    // 화려한 상승음
    [523.25, 587.33, 659.25, 698.46, 783.99, 880, 1046.5].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.06;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.3);
    });
  } else if (type === 'tap') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.1);
  } else if (type === 'complete') {
    // 결과 축하음
    const melody = [523, 659, 783, 1046, 783, 1046, 1318];
    melody.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.35);
    });
  }
}

// BGM: 부드러운 5음계 루프
function startBGM() {
  if (!soundOn) return;
  initAudio();
  stopBGM();
  const ctx = audioCtx;
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.05;
  masterGain.connect(ctx.destination);

  // C major pentatonic: C, D, E, G, A
  const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 392.00, 329.63];
  let step = 0;
  const interval = setInterval(() => {
    if (!soundOn || !bgmNodes) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = notes[step % notes.length];
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(1, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.connect(gain).connect(masterGain);
    osc.start(t); osc.stop(t + 0.7);
    step++;
  }, 500);
  bgmNodes = { interval, masterGain };
}
function stopBGM() {
  if (bgmNodes) {
    clearInterval(bgmNodes.interval);
    bgmNodes.masterGain.disconnect();
    bgmNodes = null;
  }
}

// 사운드 토글
document.getElementById('soundToggle').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) startBGM();
  else stopBGM();
});

// ============================
// 책별 통계
// ============================
function getBookStats(bookId) {
  const items = DATA.items.filter(it => it.book === bookId);
  const p = loadProgress();
  let totalCorrect = 0;
  let totalAttempts = 0;
  let stars = 0;
  items.forEach(it => {
    const prog = p[it.id] || { attempts: 0, correct: 0, level: 0 };
    totalCorrect += prog.correct;
    totalAttempts += prog.attempts;
    if (prog.level >= 5) stars++;
  });
  return {
    totalItems: items.length,
    stars,
    progressPercent: items.length > 0 ? Math.round((stars / items.length) * 100) : 0
  };
}

// ============================
// 홈 화면
// ============================
function renderHome() {
  // 별/도감 카운터 갱신
  updateStarDisplay();
  
  const grid = document.getElementById('booksGrid');
  grid.innerHTML = '';
  Object.entries(BOOK_INFO).forEach(([bookId, info]) => {
    const stats = getBookStats(bookId);
    const card = document.createElement('div');
    card.className = 'book-card';
    card.dataset.color = info.color;
    card.innerHTML = `
      <div class="book-icon">${info.icon}</div>
      <div class="book-name">${info.name}</div>
      <div class="book-progress"><div class="book-progress-fill" style="width: ${stats.progressPercent}%"></div></div>
      <div class="book-progress-text">⭐ ${stats.stars} / ${stats.totalItems}</div>
    `;
    card.addEventListener('click', () => {
      playSound('tap');
      openBook(bookId);
    });
    grid.appendChild(card);
  });
  showScreen('screen-home');
}

// ============================
// 책 화면 (유닛 선택)
// ============================
function openBook(bookId) {
  currentBook = bookId;
  const info = BOOK_INFO[bookId];
  document.getElementById('bookTitle').textContent = info.name;
  
  // 유닛별로 그룹화 (unit 또는 category)
  const items = DATA.items.filter(it => it.book === bookId);
  const groups = {};
  items.forEach(it => {
    let key;
    if (it.unit === 'etc') key = '✨ 더 많은 단어';
    else if (it.unit !== undefined) key = `Unit ${it.unit}`;
    else key = it.category || 'All';
    if (!groups[key]) groups[key] = [];
    groups[key].push(it);
  });

  const grid = document.getElementById('unitsGrid');
  grid.innerHTML = '';
  
  // 전체 모드 카드
  const allCard = document.createElement('div');
  allCard.className = 'unit-card';
  allCard.innerHTML = `
    <div class="unit-emoji">🎯</div>
    <div class="unit-name">전체 랜덤</div>
    <div class="unit-count">${items.length}개 단어</div>
  `;
  allCard.addEventListener('click', () => {
    playSound('tap');
    startQuiz(items);
  });
  grid.appendChild(allCard);

  // 유닛별 카드
  Object.entries(groups).forEach(([groupName, groupItems]) => {
    const p = loadProgress();
    let stars = 0;
    groupItems.forEach(it => {
      const prog = p[it.id] || { level: 0 };
      if (prog.level >= 5) stars++;
    });
    const starDisplay = stars > 0 ? '⭐'.repeat(Math.min(3, Math.ceil(stars / Math.max(1, groupItems.length / 3)))) : '';
    
    const card = document.createElement('div');
    card.className = 'unit-card';
    // 첫 단어의 이모지를 카드 아이콘으로 (ETC는 ✨)
    const firstEmoji = groupName.startsWith('✨') ? '✨' : (getEmoji(groupItems[0].word || groupItems[0].letter || '') || '📖');
    card.innerHTML = `
      <div class="unit-emoji">${firstEmoji}</div>
      <div class="unit-name">${groupName}</div>
      <div class="unit-count">${groupItems.length}개 단어</div>
      <div class="unit-stars">${starDisplay || '⚪⚪⚪'}</div>
    `;
    card.addEventListener('click', () => {
      playSound('tap');
      startQuiz(groupItems);
    });
    grid.appendChild(card);
  });

  // 책 별점 표시
  const stats = getBookStats(bookId);
  document.getElementById('bookStars').textContent = stats.stars;

  showScreen('screen-book');
}

// ============================
// 퀴즈
// ============================
function startQuiz(items) {
  // 출제 가능한 type만 필터링 (sentence, sight_word 제외)
  const PLAYABLE_TYPES = ['vocab', 'vocabulary', 'phonics_word', 'content_vocab', 'letter'];
  const typed = items.filter(it => PLAYABLE_TYPES.includes(it.type));
  
  // 이모지 매핑 가능한 단어 (letter는 emoji 없어도 OK)
  const playable = typed.filter(it => {
    const word = it.word || it.letter || it.text;
    if (!word) return false;
    if (it.type === 'letter') return true; // 알파벳은 텍스트 그대로
    return getEmoji(word) !== null;
  });

  let pool = playable.length >= 4 ? playable : typed.filter(it => it.word || it.letter);
  if (pool.length < 4) {
    alert('아직 문제가 부족해요! 다른 단원을 골라봐요.');
    return;
  }

  // 우선순위: 레벨 낮은 것 먼저
  const p = loadProgress();
  pool.sort((a, b) => {
    const la = (p[a.id] || { level: 0 }).level;
    const lb = (p[b.id] || { level: 0 }).level;
    return la - lb;
  });

  // 10개 선택 (낮은 레벨 위주 + 셔플)
  const lowLevel = pool.slice(0, Math.min(20, pool.length));
  shuffle(lowLevel);
  quizItems = lowLevel.slice(0, Math.min(10, lowLevel.length));
  quizTotal = quizItems.length;
  quizIndex = 0;
  quizCorrect = 0;
  
  document.getElementById('quizQTotal').textContent = quizTotal;
  updateStarDisplay();
  showScreen('screen-quiz');
  nextQuestion();
}

function nextQuestion() {
  if (quizIndex >= quizItems.length) {
    showResult();
    return;
  }
  const item = quizItems[quizIndex];
  const word = item.word || item.letter || '';
  const emoji = getEmoji(word);
  const isLetter = item.type === 'letter';
  
  // 진행도 표시
  document.getElementById('quizQNum').textContent = quizIndex + 1;
  document.getElementById('quizProgress').style.width = `${((quizIndex) / quizTotal) * 100}%`;

  // 현재 레벨 표시
  const prog = getItemProgress(item.id);
  const lvInfo = levelInfo(prog.level);
  document.getElementById('questionLevel').textContent = `${lvInfo.icon} ${prog.correct}/20`;

  // 알파벳이거나 이모지 매핑 없으면 무조건 word_to_word 모드 (텍스트 매칭)
  let mode;
  if (isLetter || !emoji) {
    mode = 'word_to_word';
  } else {
    mode = Math.random() < 0.5 ? 'emoji_to_word' : 'word_to_emoji';
  }
  
  const qContent = document.getElementById('questionContent');
  const qPrompt = document.getElementById('questionPrompt');
  
  let correctAnswer;
  let choices = [];
  
  if (mode === 'word_to_emoji' && emoji) {
    qPrompt.textContent = '같은 그림은?';
    qContent.textContent = word;
    qContent.className = 'question-content text';
    correctAnswer = emoji;
    const otherItems = DATA.items.filter(it => {
      const w = it.word || it.letter || '';
      const e = getEmoji(w);
      return e && e !== emoji && it.id !== item.id;
    });
    shuffle(otherItems);
    const wrongs = [];
    const usedEmojis = new Set([emoji]);
    for (const oi of otherItems) {
      const ow = oi.word || oi.letter;
      const oe = getEmoji(ow);
      if (!usedEmojis.has(oe)) {
        wrongs.push({ display: oe, value: oe });
        usedEmojis.add(oe);
      }
      if (wrongs.length >= 3) break;
    }
    choices = [{ display: emoji, value: emoji, correct: true }, ...wrongs.map(w => ({ ...w, correct: false }))];
  } else if (mode === 'word_to_word') {
    // 알파벳 또는 매핑 없는 단어 - 큰 텍스트로 보여주고 같은 단어 4개 중 고르기
    qPrompt.textContent = isLetter ? '같은 알파벳을 골라요!' : '같은 단어를 골라요!';
    qContent.textContent = word;
    qContent.className = 'question-content text';
    correctAnswer = word;
    // 같은 type의 다른 항목들로 오답
    const otherItems = DATA.items.filter(it => {
      const w = it.word || it.letter || '';
      return w && w !== word && it.id !== item.id && it.type === item.type;
    });
    shuffle(otherItems);
    const wrongs = [];
    const usedWords = new Set([word.toLowerCase()]);
    for (const oi of otherItems) {
      const ow = oi.word || oi.letter;
      if (!usedWords.has(ow.toLowerCase())) {
        wrongs.push({ display: ow, value: ow });
        usedWords.add(ow.toLowerCase());
      }
      if (wrongs.length >= 3) break;
    }
    choices = [{ display: word, value: word, correct: true }, ...wrongs.map(w => ({ ...w, correct: false }))];
  } else {
    // emoji_to_word: 이모지 보여주고 단어 4개 중 고르기
    qPrompt.textContent = '무엇일까요?';
    qContent.textContent = emoji;
    qContent.className = 'question-content';
    correctAnswer = word;
    const otherItems = DATA.items.filter(it => {
      const w = it.word || it.letter || '';
      return w && w !== word && it.id !== item.id && getEmoji(w);
    });
    shuffle(otherItems);
    const wrongs = [];
    const usedWords = new Set([word.toLowerCase()]);
    for (const oi of otherItems) {
      const ow = oi.word || oi.letter;
      if (!usedWords.has(ow.toLowerCase())) {
        wrongs.push({ display: ow, value: ow });
        usedWords.add(ow.toLowerCase());
      }
      if (wrongs.length >= 3) break;
    }
    choices = [{ display: word, value: word, correct: true }, ...wrongs.map(w => ({ ...w, correct: false }))];
  }

  shuffle(choices);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c.display;
    // 텍스트 선택지면 폰트 변경
    if (c.display === c.display.match(/^[a-zA-Z\s]+$/)?.[0]) {
      btn.classList.add('text');
    }
    btn.addEventListener('click', () => handleAnswer(btn, c.correct, item));
    choicesEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, item) {
  // 모든 버튼 비활성화
  document.querySelectorAll('.choice').forEach(b => b.classList.add('disabled'));
  
  const result = updateItemProgress(item.id, isCorrect);
  
  if (isCorrect) {
    btn.classList.add('correct');
    quizCorrect++;
    playSound('correct');
    spawnConfetti(btn);
    
    // 별 +1 즉시 적립
    addStars(1);
    flyStarTo(btn);
    
    if (result.leveledUp) {
      setTimeout(() => showLevelUp(result.newLevel), 600);
      setTimeout(() => { quizIndex++; nextQuestion(); }, 2200);
    } else {
      setTimeout(() => { quizIndex++; nextQuestion(); }, 1200);
    }
  } else {
    btn.classList.add('wrong');
    playSound('wrong');
    // 정답 표시
    document.querySelectorAll('.choice').forEach(b => {
      if (b.textContent === (item.word || item.letter) || 
          b.textContent === getEmoji(item.word || item.letter || '')) {
        b.classList.add('correct');
      }
    });
    setTimeout(() => { quizIndex++; nextQuestion(); }, 1800);
  }
}

function showLevelUp(level) {
  const info = levelInfo(level);
  document.getElementById('levelupIcon').textContent = info.icon;
  document.getElementById('levelupText').textContent = `${info.name}!`;
  document.getElementById('levelupPopup').classList.add('show');
  playSound('levelup');
  setTimeout(() => {
    document.getElementById('levelupPopup').classList.remove('show');
  }, 1500);
}

function spawnConfetti(originEl) {
  const rect = originEl.getBoundingClientRect();
  const colors = ['#FF6B9D', '#4ECDC4', '#FFE66D', '#95E1D3', '#C9A0FF', '#FF8C42'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width) + 'px';
    c.style.top = rect.top + 'px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    c.style.animationDuration = (1.5 + Math.random()) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2500);
  }
}

function showResult() {
  document.getElementById('resultScore').textContent = `${quizCorrect} / ${quizTotal} 정답!`;
  let starCount = 0;
  if (quizCorrect === quizTotal) starCount = 3;
  else if (quizCorrect >= quizTotal * 0.7) starCount = 2;
  else if (quizCorrect >= quizTotal * 0.4) starCount = 1;
  
  document.getElementById('resultStars').textContent = 
    '⭐'.repeat(starCount) + '☆'.repeat(3 - starCount);
  
  // 이번 퀴즈에서 획득한 별
  document.getElementById('resultEarnedStars').textContent = `+${quizCorrect}`;
  
  playSound('complete');
  showScreen('screen-result');
}

function retryQuiz() {
  playSound('tap');
  openBook(currentBook);
}

function confirmQuit() {
  if (confirm('그만할래요?')) {
    playSound('tap');
    openBook(currentBook);
  }
}

function goHome() {
  playSound('tap');
  renderHome();
}

// ============================
// 유틸
// ============================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active', 'entering'));
  const el = document.getElementById(id);
  el.classList.add('active', 'entering');
}

// ============================
// 초기화
// ============================
async function init() {
  try {
    const res = await fetch('english_textbooks.json');
    DATA = await res.json();
  } catch (e) {
    alert('데이터 불러오기 실패: ' + e.message);
    return;
  }
  
  document.getElementById('loading').style.display = 'none';
  renderHome();

  // 첫 사용자 인터랙션 후 BGM 시작
  document.addEventListener('click', () => {
    if (soundOn && !bgmNodes) startBGM();
  }, { once: true });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});

init();
